components:
  schemas:
    FileServerConfig:
      type: object
      required: [config_id, profile_name, base_url, is_default, user_create, date_create, is_active]
      properties:
        config_id:
          type: number
        profile_name:
          type: string
        base_url:
          type: string
        is_default:
          type: boolean
        config_description:
          type: string
        user_create:
          type: string
        user_modify:
          type: string
        date_create:
          type: string
        date_modify:
          type: string
        is_active:
          type: boolean
    CreateFileServerConfigDto:
      type: object
      required: [config_id, profile_name, base_url, is_default, user_create, date_create, is_active]
      properties:
        config_id:
          type: number
        profile_name:
          type: string
        base_url:
          type: string
        is_default:
          type: boolean
        config_description:
          type: string
        user_create:
          type: string
        user_modify:
          type: string
        date_create:
          type: string
        date_modify:
          type: string
        is_active:
          type: boolean
    TenantIdentity:
      type: object
      required: [tenant_identity_id, tenant_uuid, tenant_code, tenant_name, country_code, timezone, fhir_version, environment, system_version, provisioned_at, user_create, date_create, is_active]
      properties:
        tenant_identity_id:
          type: number
